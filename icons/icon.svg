<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="72%" r="58%">
      <stop offset="0%"   stop-color="#503214" stop-opacity=".85"/>
      <stop offset="60%"  stop-color="#1a1008" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#0e0a06" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gl" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#e0b428" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#e0b428" stop-opacity=".85"/>
      <stop offset="100%" stop-color="#e0b428" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="88" fill="#0e0a06"/>
  <rect width="512" height="512" rx="88" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="76"  cy="74"  r="2.2" fill="#e0b428" opacity=".45"/>
  <circle cx="148" cy="44"  r="1.6" fill="#e0b428" opacity=".30"/>
  <circle cx="364" cy="58"  r="2.0" fill="#e0b428" opacity=".38"/>
  <circle cx="438" cy="96"  r="1.4" fill="#e0b428" opacity=".28"/>
  <circle cx="68"  cy="398" r="1.6" fill="#e0b428" opacity=".22"/>
  <circle cx="444" cy="376" r="2.0" fill="#e0b428" opacity=".28"/>
  <circle cx="460" cy="170" r="1.4" fill="#e0b428" opacity=".20"/>
  <circle cx="54"  cy="240" r="1.8" fill="#e0b428" opacity=".18"/>

  <!-- ── Pyramid of cards ── -->

  <!-- Bottom row: 3 face-up cards -->
  <rect x="132" y="300" width="68" height="96" rx="7" fill="#b45a28"/>
  <rect x="218" y="300" width="68" height="96" rx="7" fill="#165898"/>
  <rect x="304" y="300" width="68" height="96" rx="7" fill="#146834"/>
  <!-- Highlights -->
  <rect x="132" y="300" width="68" height="18" rx="7" fill="rgba(255,255,255,.22)"/>
  <rect x="218" y="300" width="68" height="18" rx="7" fill="rgba(255,255,255,.22)"/>
  <rect x="304" y="300" width="68" height="18" rx="7" fill="rgba(255,255,255,.22)"/>
  <!-- Label lines -->
  <rect x="142" y="330" width="34" height="6" rx="3" fill="rgba(255,255,255,.35)"/>
  <rect x="142" y="342" width="24" height="5" rx="2" fill="rgba(255,255,255,.22)"/>
  <rect x="228" y="330" width="34" height="6" rx="3" fill="rgba(255,255,255,.35)"/>
  <rect x="228" y="342" width="24" height="5" rx="2" fill="rgba(255,255,255,.22)"/>
  <rect x="314" y="330" width="34" height="6" rx="3" fill="rgba(255,255,255,.35)"/>
  <rect x="314" y="342" width="24" height="5" rx="2" fill="rgba(255,255,255,.22)"/>
  <!-- Card borders -->
  <rect x="132" y="300" width="68" height="96" rx="7" fill="none" stroke="rgba(255,255,255,.28)" stroke-width="1.5"/>
  <rect x="218" y="300" width="68" height="96" rx="7" fill="none" stroke="rgba(255,255,255,.28)" stroke-width="1.5"/>
  <rect x="304" y="300" width="68" height="96" rx="7" fill="none" stroke="rgba(255,255,255,.28)" stroke-width="1.5"/>

  <!-- Middle row: 2 face-down cards -->
  <rect x="175" y="206" width="68" height="96" rx="7" fill="#0d1828"/>
  <rect x="261" y="206" width="68" height="96" rx="7" fill="#0d1828"/>
  <!-- Stripe pattern -->
  <rect x="183" y="220" width="52" height="6" rx="2" fill="#1c3254" opacity=".7"/>
  <rect x="183" y="234" width="52" height="6" rx="2" fill="#1c3254" opacity=".7"/>
  <rect x="183" y="248" width="52" height="6" rx="2" fill="#1c3254" opacity=".7"/>
  <rect x="183" y="262" width="52" height="6" rx="2" fill="#1c3254" opacity=".7"/>
  <rect x="269" y="220" width="52" height="6" rx="2" fill="#1c3254" opacity=".7"/>
  <rect x="269" y="234" width="52" height="6" rx="2" fill="#1c3254" opacity=".7"/>
  <rect x="269" y="248" width="52" height="6" rx="2" fill="#1c3254" opacity=".7"/>
  <rect x="269" y="262" width="52" height="6" rx="2" fill="#1c3254" opacity=".7"/>
  <rect x="175" y="206" width="68" height="96" rx="7" fill="none" stroke="#1e3a5a" stroke-width="2"/>
  <rect x="261" y="206" width="68" height="96" rx="7" fill="none" stroke="#1e3a5a" stroke-width="2"/>

  <!-- Top card (apex, face-down) -->
  <rect x="218" y="112" width="68" height="96" rx="7" fill="#0a1020"/>
  <rect x="226" y="126" width="52" height="5" rx="2" fill="#142038" opacity=".7"/>
  <rect x="226" y="139" width="52" height="5" rx="2" fill="#142038" opacity=".7"/>
  <rect x="226" y="152" width="52" height="5" rx="2" fill="#142038" opacity=".7"/>
  <rect x="226" y="165" width="52" height="5" rx="2" fill="#142038" opacity=".7"/>
  <rect x="218" y="112" width="68" height="96" rx="7" fill="none" stroke="#182848" stroke-width="2"/>

  <!-- Gold glow below pyramid -->
  <ellipse cx="256" cy="408" rx="130" ry="12" fill="#e0b428" opacity=".14"/>

  <!-- Gold line -->
  <line x1="96" y1="413" x2="416" y2="413" stroke="url(#gl)" stroke-width="2"/>

  <!-- "7" numeral with glow -->
  <g filter="url(#tglow)">
    <text x="258" y="84"
          font-family="Georgia,'Times New Roman',serif"
          font-size="78" font-weight="900"
          fill="#e8c040"
          text-anchor="middle" dominant-baseline="middle">7</text>
  </g>

  <!-- Outer border -->
  <rect x="3" y="3" width="506" height="506" rx="86" fill="none" stroke="rgba(200,160,40,.28)" stroke-width="3"/>
</svg>
